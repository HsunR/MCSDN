spring:
  application:
    name: blog-cc
  datasource:
    url: jdbc:mysql://localhost:3306/blog_cc?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true

flyway:
  enabled: true
  baseline-on-migrate: true
  locations: classpath:db/migration

jwt:
  secret: "blog-cc-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256"
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8080
